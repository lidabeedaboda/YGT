<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You've Got Talent</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎤</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Fredoka',sans-serif;
}

body{
    min-height:100vh;
    padding:30px;
    background:#f4f7ff;
    color:#111;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    font-size:2.8rem;
}

.dashboard{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:1.6fr 1fr;
    gap:20px;
}

.widget{
    background:white;
    border-radius:24px;
    padding:22px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

h2{
    margin-bottom:12px;
}

.announcement{
    background:#f1f5ff;
    padding:14px;
    border-radius:16px;
    margin-top:10px;
}

.locked{
    background:#f3f3f3;
    padding:30px;
    text-align:center;
    border-radius:16px;
}

input,textarea,select{
    width:100%;
    margin-top:10px;
    padding:12px;
    border-radius:14px;
    border:1px solid #ddd;
}

button{
    width:100%;
    margin-top:12px;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#4f46e5;
    color:white;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#4338ca;
}

.popup{
    position:fixed;
    top:20px;
    right:20px;
    background:#22c55e;
    color:white;
    padding:14px 18px;
    border-radius:14px;
    display:none;
}

.small{
    font-size:.9rem;
    opacity:.8;
}

</style>
</head>

<body>

<div class="popup" id="popup">🎉 Appeal Submitted!</div>

<div class="header">
    <h1>🎤 You've Got Talent</h1>
    <p class="small">Home of the talent show</p>
</div>

<div class="dashboard">

<!-- LEFT -->
<div class="widget">

    <h2>👋 Welcome</h2>
    <p>Welcome to You've Got Talent - Home of the talent show.</p>

    <div class="announcement">
        📌 Sneak peeks are being posted more than ever!
    </div>

    <h2 style="margin-top:20px;">🎊 Events</h2>
    <p class="small">No upcoming events.</p>

</div>

<!-- RIGHT -->
<div class="widget">

    <h2>🗓️ Activity Tracker</h2>
    <div class="locked">🔒 You can't see this page!</div>

    <h2 style="margin-top:20px;">🚨 Ban Appeals</h2>

    <form id="appealForm">

        <input id="discord" placeholder="Discord Username & ID" required>
        <input id="roblox" placeholder="Roblox Username & ID" required>

        <textarea id="reason" placeholder="Why were you moderated?" required></textarea>

        <textarea id="future" placeholder="How will you improve?" required></textarea>

        <select id="tos" required>
            <option value="">Agree to TOS?</option>
            <option>Yes</option>
            <option>No</option>
        </select>

        <button type="submit">Submit Appeal</button>

    </form>

</div>

</div>

<script>
document.getElementById("appealForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        discord: discord.value,
        roblox: roblox.value,
        reason: reason.value,
        future: future.value,
        tos: tos.value
    };

    await fetch("/api/appeal", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
    });

    document.getElementById("appealForm").reset();

    const popup = document.getElementById("popup");
    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
    }, 3000);
});
</script>

</body>
</html>
