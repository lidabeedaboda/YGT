<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aloha Development</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎤</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Fredoka',sans-serif;
}

body{
    background:#eaf4ff;
    color:#0f172a;
    padding:25px;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    font-size:3rem;
    color:#2563eb;
}

.dashboard{
    max-width:1300px;
    margin:auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.widget{
    background:white;
    border-radius:22px;
    padding:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

h2{
    color:#1d4ed8;
}

.scroll-box{
    height:280px;
    overflow-y:auto;
    background:#f1f7ff;
    padding:10px;
    border-radius:14px;
}

.player{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    background:white;
    border-radius:12px;
    margin-bottom:8px;
}

.player-left{
    display:flex;
    align-items:center;
    gap:10px;
}

input,textarea,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:12px;
    border:1px solid #cbd5e1;
}

button{
    width:100%;
    margin-top:12px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#3b82f6;
    color:white;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

.popup{
    position:fixed;
    top:20px;
    right:20px;
    background:#22c55e;
    color:white;
    padding:12px 16px;
    border-radius:12px;
    display:none;
}

.countdown{
    margin-top:10px;
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="popup" id="popup">🎉 Appeal Submitted!</div>

<div class="header">
    <h1>Aloha Development</h1>
    <p>You've Got Talent System</p>
</div>

<div class="dashboard">

<div class="widget">
    <h2>👋 Welcome</h2>
    <p>Talent show dashboard system.</p>
</div>

<div class="widget">
    <h2>🎊 Events</h2>
    <p>No upcoming events.</p>
</div>

<div class="widget">
    <h2>📊 Activity Tracker</h2>
    <div class="scroll-box" id="playerList"></div>
    <div class="countdown" id="countdown"></div>
</div>

<div class="widget">
    <h2>🚨 Ban Appeals</h2>

    <form id="appealForm">
        <input id="discord" placeholder="Discord Username & ID" required>
        <input id="roblox" placeholder="Roblox Username & ID" required>

        <textarea id="reason" placeholder="Why were you moderated?" required></textarea>
        <textarea id="future" placeholder="How will you improve?" required></textarea>

        <select id="tos" required>
            <option value="">TOS?</option>
            <option>Yes</option>
            <option>No</option>
        </select>

        <button type="submit">Submit</button>
    </form>
</div>

</div>

<script>
function showPopup(){
    const p=document.getElementById("popup");
    p.style.display="block";
    setTimeout(()=>p.style.display="none",3000);
}

document.getElementById("appealForm").addEventListener("submit", async (e)=>{
    e.preventDefault();

    await fetch("/api/appeal",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            discord:discord.value,
            roblox:roblox.value,
            reason:reason.value,
            future:future.value,
            tos:tos.value
        })
    });

    document.getElementById("appealForm").reset();
    showPopup();
});

/* ================= TRACKER ================= */

let resetTime = 0;

function format(ms){
    let s=Math.floor(ms/1000);
    let d=Math.floor(s/86400); s%=86400;
    let h=Math.floor(s/3600); s%=3600;
    let m=Math.floor(s/60);
    let sec=s%60;
    return `${d}d ${h}h ${m}m ${sec}s`;
}

async function loadPlayers(){

    const res = await fetch("/api/players",{cache:"no-store"});
    const data = await res.json();

    resetTime = data.resetAt;

    const box = document.getElementById("playerList");
    box.innerHTML="";

    data.players.forEach((p,i)=>{

        const headshot =
        `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${p.userId}&size=150x150&format=Png&isCircular=true`;

        const div=document.createElement("div");
        div.className="player";

        div.innerHTML=`
            <div class="player-left">
                <img src="${headshot}" width="40" height="40" style="border-radius:50%;">
                <span>#${i+1} ${p.username} | ${p.rank}</span>
            </div>
            <span>⏱ ${p.minutes || 0} min</span>
        `;

        box.appendChild(div);
    });
}

setInterval(()=>{
    document.getElementById("countdown").innerText =
    "Resets in: " + format(resetTime - Date.now());
},1000);

setInterval(loadPlayers,2000);
loadPlayers();
</script>

</body>
</html>
